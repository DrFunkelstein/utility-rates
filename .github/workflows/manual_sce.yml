name: Manual SCE Update
on:
  workflow_dispatch: # This creates the manual trigger button
    inputs:
      dry_run:
        description: 'Dry Run (Test only, do not update JSON)'
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Tools
        run: pip install pdfplumber
      
      - name: Run Parser
        # Pass the choice to the Python script
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python parse_sce_manual.py --dry-run
          else
            python parse_sce_manual.py
          fi

      - name: Commit and Clean Up
        # Only runs if it was NOT a dry run and the script succeeded
        if: github.event.inputs.dry_run == 'false'
        run: |
          git config --global user.name 'SCE-Manual-Bot'
          git config --global user.email 'bot@utility.com'
          git add sce_rates.json
          git rm sce_uploads/*.pdf || echo "No files to remove"
          git commit -m "Updated SCE rates from manual PDF upload" || exit 0
          git push
