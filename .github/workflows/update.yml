name: LADWP Auto Update
on:
  schedule:
    - cron: '0 10 1 * *' # Runs at 10:00 AM on the 1st of every month
  workflow_dispatch: # Allows you to run it manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python update_rates.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'LADWP-Bot'
          git config --global user.email 'bot@utilityestimator.com'
          git add ladwp_2026.json
          git commit -m "Automated rate update: $(date)" || exit 0
          git push
